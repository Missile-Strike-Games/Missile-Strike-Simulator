    <script>
        // --- Web Audio API (Sound System) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        let soundEnabled = true;

        document.getElementById('soundToggle').addEventListener('change', (e) => {
            soundEnabled = e.target.checked;
            if(soundEnabled && audioCtx.state === 'suspended') audioCtx.resume();
        });
        
        // Initialize audio on first click anywhere
        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended' && soundEnabled) audioCtx.resume();
        }, { once: true });

        function playSound(type) {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'launch') {
                // צליל שיגור רך ועמוק יותר (לא מפחיד)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 1.2);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                osc.start(now);
                osc.stop(now + 1.2);
            } else if (type === 'explosion') {
                // פיצוץ עמום ומרוחק יותר (בום עדין ולא רעש לבן צורם)
                const bufferSize = audioCtx.sampleRate * 1.0;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, now);
                filter.frequency.exponentialRampToValueAtTime(30, now + 1.0);
                
                noise.connect(filter);
                filter.connect(gainNode);
                
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                noise.start(now);
                noise.stop(now + 1.0);
            } else if (type === 'intercept') {
                // צליל יירוט קצר ועדין (כמו קליק טקטי)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.2);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        // --- Gemini API Setup ---
        const apiKey = ""; 
        
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        document.getElementById('aiScenarioBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiScenarioBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Consulting AI... ✨</span>`;
            
            const prompt = `Generate a realistic or historically plausible hypothetical military strike scenario. 
            Return ONLY a raw JSON object (no markdown, no backticks) with the following exact keys:
            "origin": (string, origin city name),
            "target": (string, target city name, must be a different country),
            "type": (string, exactly one of: "mrbm", "icbm", "uav", "cruise"),
            "count": (number, realistic integer between 5 and 50).`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if(text) {
                    const scenario = JSON.parse(text);
                    document.getElementById('sourceCity').value = scenario.origin;
                    document.getElementById('targetCity').value = scenario.target;
                    document.getElementById('missileType').value = scenario.type;
                    document.getElementById('missileCount').value = scenario.count;
                    addLog(`AI Scenario Loaded: Conflict between ${scenario.origin} and ${scenario.target}.`, 'warning');
                }
            } catch (err) {
                addLog('AI Scenario Generation Failed.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        document.getElementById('aiReportBtn').addEventListener('click', async () => {
            const btn = document.getElementById('aiReportBtn');
            const panel = document.getElementById('ai-report-panel');
            const content = document.getElementById('ai-report-content');
            
            if (gameStats.launched === 0) {
                panel.style.display = 'block';
                content.innerHTML = '<span class="text-red-400">ERROR: NO TELEMETRY DATA.</span>';
                return;
            }

            btn.disabled = true;
            panel.style.display = 'block';
            content.innerHTML = '<span class="animate-pulse">GENERATING BDA...</span>';
            
            const origin = document.getElementById('sourceCity').value;
            const target = document.getElementById('targetCity').value;

            // Updated prompt to be short, tactical, and clear
            const prompt = `You are a military intelligence AI. Write a highly concise, 3-point bulleted Battle Damage Assessment (BDA) report.
            Data: ${origin} attacked ${target}. Total Launched: ${gameStats.launched}. Impacts: ${gameStats.hits}. Intercepted: ${gameStats.intercepted}.
            Rule: Output ONLY the bullet points using asterisks (*). Use short military terminology. Do not write introductory or concluding text.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "ANALYSIS FAILED.";
                
                // Formating the raw text to HTML lists
                text = text.replace(/\* (.*)/g, '<li>$1</li>');
                text = `<ul>${text}</ul>`;

                content.innerHTML = "";

        function latLongToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180), theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(-(radius * Math.sin(phi) * Math.cos(theta)), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
        }

            const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
            cityGroup.quaternion.copy(quat);

            const numBuildings = 120;
            const districts = [
                {x: 0, y: 0, r: 0.02, h: 1.0}, 
                {x: 0.015, y: 0.015, r: 0.015, h: 0.5}, 
                {x: -0.015, y: -0.015, r: 0.02, h: 0.4} 
// עדכון התקדמות המשימה - גרסה מתוקנת
if (typeof checkMissionProgress === 'function') {

            for(let i=0; i<numBuildings; i++) {
                const dist = districts[Math.floor(Math.random() * districts.length)];
                const ang = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.8) * dist.r;
                const lx = dist.x + Math.cos(ang) * r;
                const lz = dist.y + Math.sin(ang) * r;

                const gridSize = 0.003;
                const snappedX = Math.round(lx / gridSize) * gridSize;
                const snappedZ = Math.round(lz / gridSize) * gridSize;

                const centerDist = Math.sqrt(Math.pow(snappedX-dist.x, 2) + Math.pow(snappedZ-dist.y, 2));
                const heightMult = Math.max(0.1, 1.0 - (centerDist / dist.r));
                
                const isSkyscraper = Math.random() > 0.7 && heightMult > 0.5;
                const w = 0.002 + Math.random() * 0.003;
                const d = 0.002 + Math.random() * 0.003;
                const h = (0.003 + Math.random() * 0.01) + (isSkyscraper ? Math.random() * 0.04 * dist.h * heightMult : 0);
                
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshPhongMaterial({
                    color: 0x334455,
                    emissive: Math.random() > 0.7 ? 0x112233 : 0x000000,
                    specular: 0x888888,
                    shininess: isSkyscraper ? 50 : 10
                });
                
                const building = new THREE.Mesh(geo, mat);
                building.position.set(snappedX, h/2, snappedZ);
                cityGroup.add(building);
            }

            earth.add(cityGroup);
        }

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function getCoords(cityName) {

                const data = await res.json();
                if (data?.results?.length > 0) return { lat: data.results[0].latitude, lon: data.results[0].longitude, name: data.results[0].name };
            } catch (e) {} return null;
        }

        // שינוי הלוגיקה כדי לייצר כטב"ם או טיל לפי בחירה!
        function createEntity(startVec, endVec, type, realDist, delayTime, targetName) {
            const isUav = type === 'uav';
            const distRatio = realDist / EARTH_RADIUS; 
            
            let speed = 2.5, arc = 0.08; 
            if (type === 'icbm') { speed = 7.0; arc = 0.15; } 
            else if (type === 'hypersonic') { speed = 4.0; arc = 0.02; }
            else if (type === 'cruise') { speed = 0.3; arc = 0.005; }
            else if (isUav) { speed = 0.08; arc = 0.001; } // כטב"ם - ממש איטי וטס נמוך מאוד
            
            const arcHeight = Math.max(distRatio * arc, (type === 'cruise' || isUav) ? 0.02 : 0.05);
            const midPoint = startVec.clone().lerp(endVec, 0.5).normalize().multiplyScalar(EARTH_RADIUS + arcHeight);
            const curve = new THREE.QuadraticBezierCurve3(startVec, midPoint, endVec);

            const mGroup = new THREE.Group();
            mGroup.visible = delayTime <= 0; 
            const scale = isUav ? 0.35 : 0.4; 
            
            if (isUav) {
                // בניית כטב"ם ריאליסטי
                // גוף (אפור כהה)
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.03*scale, 0.03*scale, 0.6*scale, 16), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 }));
                body.rotation.x = Math.PI / 2; 
                mGroup.add(body);
                
                // חרטום מעוגל
                const nose = new THREE.Mesh(new THREE.SphereGeometry(0.03*scale, 16, 16), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                nose.position.z = 0.3*scale;
                mGroup.add(nose);
                
                // כנפיים רחבות וישרות
                const wing = new THREE.Mesh(new THREE.BoxGeometry(0.6*scale, 0.01*scale, 0.1*scale), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                mGroup.add(wing);
                
                // זנב V
                const tail1 = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.01*scale, 0.05*scale), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                tail1.position.set(0.06*scale, 0.04*scale, -0.28*scale);
                tail1.rotation.z = Math.PI / 4;
                mGroup.add(tail1);
                
                const tail2 = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.01*scale, 0.05*scale), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                tail2.position.set(-0.06*scale, 0.04*scale, -0.28*scale);
                tail2.rotation.z = -Math.PI / 4;
                mGroup.add(tail2);
                
                // מנוע כטב"ם - פליטה קטנה מאוד, בלי הילה
                const engine = new THREE.Mesh(new THREE.ConeGeometry(0.02*scale, 0.1*scale, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
                engine.position.z = -0.35*scale; engine.rotation.x = -Math.PI / 2;
                mGroup.add(engine);
            } else {
                // בניית טיל רגיל (כמו שהיה)
                const stg1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04*scale, 0.04*scale, 0.4*scale, 16), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3 }));
                stg1.rotation.x = Math.PI / 2; mGroup.add(stg1);
                const stg2 = new THREE.Mesh(new THREE.CylinderGeometry(0.035*scale, 0.04*scale, 0.2*scale, 16), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 }));
                stg2.rotation.x = Math.PI / 2; stg2.position.z = 0.3*scale; mGroup.add(stg2);
                const nose = new THREE.Mesh(new THREE.ConeGeometry(0.035*scale, 0.12*scale, 16), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 }));
                nose.rotation.x = Math.PI / 2; nose.position.z = 0.46*scale; mGroup.add(nose);
                const finGeo = new THREE.BoxGeometry(0.12*scale, 0.01*scale, 0.1*scale);
                const finMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                for(let i=0; i<4; i++) {
                    const fin = new THREE.Mesh(finGeo, finMat);
                    fin.rotation.z = (Math.PI / 2) * i; fin.position.z = -0.15*scale;
                    mGroup.add(fin);
                }
                const fire = new THREE.Mesh(new THREE.ConeGeometry(0.05*scale, 0.25*scale, 8), new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
                fire.position.z = -0.32*scale; fire.rotation.x = -Math.PI / 2; mGroup.add(fire);
                const glow = new THREE.Mesh(new THREE.SphereGeometry(0.03*scale, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending }));
                glow.position.z = -0.3*scale; mGroup.add(glow);
            }

            mGroup.position.copy(startVec);
            const localLook = startVec.clone().add(curve.getTangentAt(0));
            mGroup.lookAt(localLook.applyMatrix4(earth.matrixWorld));

            earth.add(mGroup);checkMissionProgress('intercept');

            trailGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(60 * 3), 3));

        async function handleLaunch() {
            let src = document.getElementById('sourceCity').value.trim();
            let tgt = document.getElementById('targetCity').value.trim();
            const type = document.getElementById('missileType').value;
            let count = parseInt(document.getElementById('missileCount').value) || 1;
            if (count > 300) count = 300; 
            
            const btn = document.getElementById('launchBtn');

            if(!src || !tgt) {
                addLog('Error: Please specify origin and target.', 'danger');
                return;
            }

            btn.disabled = true; btn.innerText = "Targeting..."; btn.classList.replace('bg-red-600', 'bg-slate-600');
            
            const srcCoord = await getCoords(src);
            const tgtCoord = await getCoords(tgt);
            
            if (!srcCoord || !tgtCoord) {
                addLog(`Targeting Error: Unable to locate specified cities.`, 'danger');
                btn.disabled = false; btn.innerText = "Initiate Strike"; btn.classList.replace('bg-slate-600', 'bg-red-600');
                return;
            }

            btn.disabled = false; btn.innerText = "Initiate Strike"; btn.classList.replace('bg-slate-600', 'bg-red-600');
            
            // הפעלת סאונד שיגור!
            playSound('launch');

            document.getElementById('sourceCity').value = srcCoord.name;
            document.getElementById('targetCity').value = tgtCoord.name;
            
            spawnCityBlocks(tgtCoord.lat, tgtCoord.lon, tgtCoord.name);
            
            const realDist = getDistanceKm(srcCoord.lat, srcCoord.lon, tgtCoord.lat, tgtCoord.lon);
            
            let speedKmS = 2.5;
            if (type === 'icbm') speedKmS = 7.0;
            else if (type === 'hypersonic') speedKmS = 4.0;
            else if (type === 'cruise') speedKmS = 0.3;
            else if (type === 'uav') speedKmS = 0.08;
            
            const flightTimeSecs = Math.round(realDist / speedKmS);
            const flightMins = Math.floor(flightTimeSecs / 60);
            const flightSecs = flightTimeSecs % 60;
            const timeStr = flightMins > 0 ? `${flightMins}m ${flightSecs}s` : `${flightSecs}s`;
            
            const typeName = type === 'uav' ? 'UAV(s)' : 'missile(s)';
            addLog(`WARNING: Launching volley of ${count} ${typeName} from ${srcCoord.name} to ${tgtCoord.name}`, 'warning');
            addLog(`Est. Real-World Flight Time: ${timeStr} (${Math.round(realDist)}km)`, 'info');
            
            gameStats.launched += count;
            updateStatsUI();

            for(let i=0; i<count; i++) {
                const jLatS = srcCoord.lat + (Math.random()-0.5)*0.8;
                const jLonS = srcCoord.lon + (Math.random()-0.5)*0.8;
                const jLatT = tgtCoord.lat + (Math.random()-0.5)*0.8;
                const jLonT = tgtCoord.lon + (Math.random()-0.5)*0.8;
                
                const sVec = latLongToVector3(jLatS, jLonS, EARTH_RADIUS);
                const tVec = latLongToVector3(jLatT, jLonT, EARTH_RADIUS);
                
                createEntity(sVec, tVec, type, realDist, i * 0.4, tgtCoord.name);
            }

            // עדכון המעקב רק אם אין משהו שעוקבים אחריו עכשיו
            if (!trackedMissile || trackedMissile.progress >= 1.0 || trackedMissile.intercepted) {
                trackedMissile = missiles[missiles.length - count]; 
            }
            
            if (currentCameraMode === 'free') {
                const startPosLocal = latLongToVector3(srcCoord.lat, srcCoord.lon, EARTH_RADIUS);
                const worldStart = startPosLocal.clone().applyMatrix4(earth.matrixWorld);
                const lookPos = worldStart.clone().normalize().multiplyScalar(EARTH_RADIUS + 15);
                camera.position.copy(lookPos);
                controls.target.set(0,0,0); // איפוס מטרה כדי לא לשבור את הזום והסיבוב
            }

            if(window.innerWidth < 1024) panel.classList.add('collapsed');
        }

        document.getElementById('launchBtn').addEventListener('click', handleLaunch);

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            time *= 0.001; const dt = time - lastTime; lastTime = time;
            
            const speedMult = parseFloat(document.getElementById('simSpeed').value);
            const airDefOn = document.getElementById('airDefense').checked;

            controls.update();
            if(earth) {
                earth.rotation.y += 0.01 * dt * (speedMult > 10 ? 1 : 0.5);
                if(earth.userData.clouds) earth.userData.clouds.rotation.y += 0.003 * dt; 
            }

            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                
                if (m.delay > 0) {
                    m.delay -= dt * speedMult;
                    if (m.delay <= 0) { m.active = true; m.mesh.visible = true; }
                    continue;
                }
                if (!m.active) continue;

                if (currentCameraMode === 'pov') {
                    m.mesh.visible = (m === trackedMissile);
                    m.trail.visible = (m === trackedMissile); 
                } else {
                    m.mesh.visible = true;
                    m.trail.visible = true;
                }

                m.progress += (dt * speedMult) / m.flightTime;

                if (airDefOn && !m.intercepted && m.progress > 0.40 && m.progress < 0.95 && m.interceptAttempts < 2) {
                    if (!m.lastInterceptProgress || (m.progress - m.lastInterceptProgress) > 0.25) {
                        m.lastInterceptProgress = m.progress;
                        m.interceptAttempts++;
                        spawnInterceptor(m.tgtVec, m); 
                    }
                }

                if (m.progress >= 0.99) {
                    m.progress = 0.99;
                    
                    if (m === trackedMissile && currentCameraMode === 'pov') {
                        povExplosion.active = true;
                        const upVec = m.curve.getPointAt(0.99).normalize();
                        povExplosion.pos = m.curve.getPointAt(0.99).add(upVec.multiplyScalar(0.05)).applyMatrix4(earth.matrixWorld); 
                        povExplosion.timer = 2.0; 
                    }
                    
                    createExplosion(m.curve.getPointAt(0.99), 0xff2200, 2.5); 
                    gameStats.hits++; updateStatsUI();
                    addLog(`IMPACT CONFIRMED: ${m.targetName}`, 'danger');

                    earth.remove(m.mesh); earth.remove(m.trail);
                    missiles.splice(i, 1);
                } else {
                    const pos = m.curve.getPointAt(m.progress);
                    m.mesh.position.copy(pos);
                    
                    const tangent = m.curve.getTangentAt(m.progress).normalize();
                    const lookTargetLocal = pos.clone().add(tangent);
                    m.mesh.lookAt(earth.localToWorld(lookTargetLocal));

                    m.trailPts.push(pos.clone());
                    if (m.trailPts.length > 50) m.trailPts.shift();
                    const arr = m.trail.geometry.attributes.position.array;
                    for (let j = 0; j < m.trailPts.length; j++) {
                        arr[j*3] = m.trailPts[j].x; arr[j*3+1] = m.trailPts[j].y; arr[j*3+2] = m.trailPts[j].z;
                    }
                    m.trail.geometry.setDrawRange(0, m.trailPts.length);
                    m.trail.geometry.attributes.position.needsUpdate = true;
                }
            }

            for (let i = interceptors.length - 1; i >= 0; i--) {
                const int = interceptors[i];
                
                if (int.target.intercepted || int.target.progress >= 1.0) {
                    createExplosion(int.pos, 0xaaaaaa, 0.5); 
                    earth.remove(int.mesh); earth.remove(int.trail);
                    interceptors.splice(i, 1);
                    continue;
                }

                const targetPos = int.target.mesh.position;
                const dir = targetPos.clone().sub(int.pos);
                const dist = dir.length();
                const intSpeed = 0.8 * speedMult * dt; 

                if (dist < 0.25 || intSpeed >= dist) {
                    if (int.willHit) {
                        int.target.intercepted = true;
                        if (int.target === trackedMissile && currentCameraMode === 'pov') {
                            povExplosion.active = true;
                            povExplosion.pos = int.pos.clone().applyMatrix4(earth.matrixWorld); 
                            povExplosion.timer = 2.0; 
                        }
                        createExplosion(int.pos, 0x00aaff, 2.0); 
                        gameStats.intercepted++; updateStatsUI();
                        addLog(`Successful intercept over ${int.target.targetName}!`, 'success');
                    } else {
                        createExplosion(int.pos, 0x888888, 1.2); 
                        addLog(`Interceptor missed its target!`, 'warning');
                    }
                    
                    earth.remove(int.mesh); earth.remove(int.trail);
                    interceptors.splice(i, 1);
                    continue;
                }

                const desiredVelocity = dir.normalize().multiplyScalar(intSpeed);
                const turnRate = Math.min(1.0, 0.15 * Math.max(1, speedMult / 10));
                
                int.velocity.lerp(desiredVelocity, turnRate);
                int.velocity.normalize().multiplyScalar(intSpeed);
                
                int.pos.add(int.velocity);
                int.mesh.position.copy(int.pos);
                int.mesh.lookAt(earth.localToWorld(int.pos.clone().add(int.velocity)));

                int.trailPts.push(int.pos.clone());
                if (int.trailPts.length > 20) int.trailPts.shift();
                const arr = int.trail.geometry.attributes.position.array;
                for (let j = 0; j < int.trailPts.length; j++) {
                    arr[j*3] = int.trailPts[j].x; arr[j*3+1] = int.trailPts[j].y; arr[j*3+2] = int.trailPts[j].z;
                }
                int.trail.geometry.setDrawRange(0, int.trailPts.length);
                int.trail.geometry.attributes.position.needsUpdate = true;
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                exp.life -= dt * (speedMult * 0.3 + 0.5); 
                if (exp.life <= 0) {
                    earth.remove(exp.sphere); earth.remove(exp.ring);
                    exp.sphere.geometry.dispose(); exp.sphere.material.dispose();
                    exp.ring.geometry.dispose(); exp.ring.material.dispose();
                    explosions.splice(i, 1);
                } else {
                    exp.scale += dt * 5;
                    exp.sphere.scale.set(exp.scale, exp.scale, exp.scale);
                    exp.ring.scale.set(exp.scale * 1.5, exp.scale * 1.5, exp.scale * 1.5);
                    exp.sphere.material.opacity = exp.life; 
                    exp.ring.material.opacity = exp.life * 0.8; 
                } 
            } 

            if (currentCameraMode === 'pov') {
                povHud.classList.add('active');
                
                const activeCount = missiles.filter(m => m.active && !m.intercepted && m.progress < 1.0).length;
                document.getElementById('hud-active').innerText = activeCount;

                if (povExplosion.active) {
                    povExplosion.timer -= dt;
                    document.getElementById('hud-status').innerText = "IMPACT DETECTED - ANALYZING...";
                    document.getElementById('hud-status').className = "text-red-500 font-bold";
                    
                    if (povExplosion.timer <= 0) {
                        povExplosion.active = false;
                        trackedMissile = null; 
                        
                        currentCameraMode = 'free';
                        cameraModeSelect.value = 'free';
                        controls.enabled = true;
                        controls.target.set(0, 0, 0); // מבטיח שאפשר לעשות זום תקין!
                        addLog('Satellite link returned to free orbit mode.', 'info');
                    } else {
                        controls.enabled = false;
                        const shakeX = (Math.random() - 0.5) * 0.4;
                        const shakeY = (Math.random() - 0.5) * 0.4;
                        
                        const upVec = povExplosion.pos.clone().normalize();
                        const camPos = povExplosion.pos.clone()
                            .add(upVec.multiplyScalar(1.5)) 
                            .add(new THREE.Vector3(shakeX, shakeY, shakeX));
                            
                        camera.position.lerp(camPos, 0.2); 
                        camera.lookAt(povExplosion.pos); 
                    }
                } 
                else {
                    if (!trackedMissile || trackedMissile.intercepted || trackedMissile.progress >= 1.0) {
                        trackedMissile = missiles.find(m => m.active && !m.intercepted && m.progress < 1.0) || 
                                         missiles.find(m => !m.intercepted && m.progress < 1.0) || null;
                    }

                    if (trackedMissile) {
                        controls.enabled = false;
                        const nameDisplay = trackedMissile.isUav ? "UAV DRONE" : "MISSILE";
                        document.getElementById('hud-target').innerText = `${trackedMissile.targetName.toUpperCase()} (${nameDisplay})`;
                        document.getElementById('hud-status').innerText = "TRACKING ACTIVE";
                        document.getElementById('hud-status').className = "text-emerald-400 font-bold";
                        
                        const mWorldPos = new THREE.Vector3();
                        trackedMissile.mesh.getWorldPosition(mWorldPos);
                        
                        const mDir = trackedMissile.curve.getTangentAt(Math.max(0, trackedMissile.progress)).normalize();
                        mDir.applyQuaternion(earth.quaternion); 
                        const mUp = mWorldPos.clone().normalize(); 
                        
                        let shakeX = 0, shakeY = 0;
                        if (trackedMissile.active) {
                            shakeX = (Math.random() - 0.5) * 0.002; 
                            shakeY = (Math.random() - 0.5) * 0.002;
                        }
                        
                        // זוויות שונות לכטב"ם (רואים יפה את הכנפיים) או טיל
                        const pullBack = trackedMissile.isUav ? 0.3 : 0.2;
                        const pullUp = trackedMissile.isUav ? 0.2 : 0.15;

                        const camPos = mWorldPos.clone()
                            .sub(mDir.clone().multiplyScalar(pullBack)) 
                            .add(mUp.clone().multiplyScalar(pullUp)) 
                            .add(mDir.clone().cross(mUp).multiplyScalar(shakeX))
                            .add(mUp.clone().multiplyScalar(shakeY));
                            
                        camera.position.copy(camPos); 
                        
                        const lookTarget = mWorldPos.clone()
                            .add(mDir.clone().multiplyScalar(1.5)) 
            camera.lookAt(lookTarget);
                    } else if (missiles.length === 0) {
                        controls.enabled = true;
                        document.getElementById('hud-target').innerText = "AWAITING COMMAND";
                        document.getElementById('hud-status').innerText = "STANDBY";
                        document.getElementById('hud-status').className = "text-yellow-400 font-bold";
                    }
                }
            } else {
                const povHud = document.getElementById('pov-hud');
                if (povHud) povHud.classList.remove('active');
            }

            renderer.render(scene, camera);
        } // סגירה של animate

        // --- הפעלה וניהול משימות ---
        window.onload = () => {
            init3D();
            if (typeof updateMissionUI === 'function') {
                updateMissionUI();
            }
        };

        let gameState = {
            currentMission: 1,
            interceptedCount: 0
        };

        const missions = {
            1: { title: "First Strike", desc: "Launch 1 missile to test global reach.", goal: 1 },
            2: { title: "Massive Barrage", desc: "Launch 300 missiles at once.", goal: 300 },
            3: { title: "Iron Dome Defense", desc: "Intercept 5 incoming enemy missiles.", goal: 5 }
        };

        function updateMissionUI() {
            const mission = missions[gameState.currentMission];
            const titleEl = document.getElementById('mission-title');
            const descEl = document.getElementById('mission-desc');
            const idEl = document.getElementById('mission-id');

            if (!mission) {
                if (titleEl) titleEl.innerText = "ALL MISSIONS CLEAR";
                if (descEl) descEl.innerText = "You have secured the globe.";
                if (idEl) idEl.innerText = "DONE";
                return;
            }
            if (idEl) idEl.innerText = "0" + gameState.currentMission;
            if (titleEl) titleEl.innerText = mission.title;
            if (descEl) descEl.innerText = mission.desc;
        }

        function checkMissionProgress(type, count = 1) {
            if (gameState.currentMission === 1 && type === 'launch') {
                completeMission();
            } else if (gameState.currentMission === 2 && type === 'launch' && count >= 300) {
                completeMission();
            } else if (gameState.currentMission === 3 && type === 'intercept') {
                gameState.interceptedCount++;
                let progress = (gameState.interceptedCount / missions[3].goal) * 100;
                const progBar = document.getElementById('mission-progress');
                if (progBar) progBar.style.width = progress + "%";
                if (gameState.interceptedCount >= missions[3].goal) completeMission();
            }
        }

        function completeMission() {
            const progressLine = document.getElementById('mission-progress');
            if (progressLine) progressLine.style.width = "100%";

            setTimeout(() => {
                const currentMissionData = missions[gameState.currentMission];
                if (currentMissionData) {
                    alert("MISSION ACCOMPLISHED: " + currentMissionData.title);
                }
                gameState.currentMission++;
                updateMissionUI();
                if (gameState.currentMission === 3) startEnemyAttack();
            }, 600);
        }

        function startEnemyAttack() {
            if (typeof addLog === 'function') addLog("RED ALERT: INCOMING MISSILES FROM TEHRAN", "danger");
            const attackInterval = setInterval(() => {
                if (gameState.currentMission !== 3) {
                    clearInterval(attackInterval);
                    return;
                }
                const origin = { lat: 35.6892, lon: 51.3890 }; 
                const target = { lat: 31.0461, lon: 34.8516 };
                if (typeof createMissile === 'function') {
                    createMissile(origin, target, 'ballistic');
                }
            }, 5000);
        }
    </script>
